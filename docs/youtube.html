<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="referrer" content="no-referrer">
	<title>SCPRP Audio Proxy</title>
	<style>
		html,body { margin:0; padding:0; width:100%; height:100%; background:#000; color:#9ad; font:11px monospace; overflow:hidden; }
		#s { padding:8px; white-space:pre-wrap; }
		.ok { color:#6f6; }
		.err { color:#f66; }
	</style>
</head>
<body>
	<audio id="p" autoplay></audio>
	<div id="s">init...</div>
	<script>
		// === SCPRP audio proxy minimal ===
		// Conçu pour les URLs Discord CDN (ou n'importe quelle URL audio directe :
		// .mp3 / .m4a / .ogg / .wav). Charge l'URL passée en ?url=... dans une
		// balise <audio> HTML5 et joue. Zéro fetch, zéro cascade, zéro CORS.
		//
		// Pipeline d'usage :
		//   1. Bot Discord (cf. /bot/yt_to_discord.py) DL un mp3 et l'upload.
		//   2. User copie l'URL CDN du fichier (clic droit → Copier le lien).
		//   3. User colle dans !menu → Musique côté SCPRP.
		//   4. MusicUrlResolver classifie comme DirectAudio.
		//   5. MusicVideoPlayerHost (VideoPlayer natif s&box) le joue direct
		//      — ce HTML n'est PAS appelé pour Discord (kept comme fallback).
		//
		// Quand ce HTML EST appelé : si on configure
		// scprp_music_youtube_proxy avec cette URL ET qu'on revient à un mode
		// embed YouTube/SoundCloud futur, ce fichier sert de host.
		// Pour l'instant, en pratique, il sert juste de fallback générique.
		//
		// Query params :
		//   ?url=ENCODED_URL  → URL directe à jouer (priorité)
		//   ?v=YOUTUBE_ID     → legacy, affiche un warning d'incompatibilité
		//   ?vol=NN           → volume initial 0..100 (default 100)
		const q = new URLSearchParams(location.search);
		const url = q.get("url");
		const vid = q.get("v");
		const vol = Math.max(0, Math.min(100, parseInt(q.get("vol") || "100", 10))) / 100;
		const p = document.getElementById("p");
		const s = document.getElementById("s");
		const set = (m, c) => { s.textContent = m; s.className = c || ""; };

		p.volume = vol;

		if (url) {
			set("loading...");
			p.src = url;
			p.addEventListener("playing", () => set("playing (vol " + Math.round(vol*100) + "%)", "ok"), { once: true });
			p.addEventListener("error", () => set("error: " + (p.error?.message || "load failed") + " — URL expirée ou bloquée ?", "err"));
			p.addEventListener("ended", () => set("ended"));
		} else if (vid) {
			set("YouTube embed désactivé (?v=...). Utilise ?url=DIRECT_AUDIO_URL via le bot Discord.", "err");
		} else {
			set("aucune URL fournie. Usage : ?url=ENCODED_AUDIO_URL", "err");
		}
	</script>
</body>
</html>
