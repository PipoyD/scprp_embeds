<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SCPRP YouTube Audio</title>
	<meta name="referrer" content="strict-origin-when-cross-origin">
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
			color: #fff;
			font-family: monospace;
			overflow: hidden;
		}
		#status {
			padding: 10px;
			font-size: 11px;
			color: #888;
		}
		#status.error {
			color: #ff6666;
		}
		#status.ok {
			color: #66ff66;
		}
	</style>
</head>
<body>
	<audio id="player" autoplay></audio>
	<div id="status">Initialisation...</div>

	<script>
		// ============================================================
		// === PIPED — extracteur d'URL audio public ===
		//
		// Piped est un frontend YouTube fédéré, open-source, qui expose
		// une API REST simple : GET /streams/{videoId} retourne un JSON
		// avec un champ `audioStreams[]` contenant les URLs googlevideo
		// directes. Pas d'iframe = 0 pub.
		//
		// Les instances meurent régulièrement (DDoS, blocs YouTube, abus
		// d'usage). On essaie une liste dans l'ordre, fallback auto.
		//
		// Pour mettre à jour la liste : https://piped.video/preferences
		// (section "Instances", ou page wiki du projet Piped).
		// Garde 3-4 instances minimum pour résilience.
		// ============================================================
		const PIPED_INSTANCES = [
			'https://pipedapi.kavin.rocks',
			'https://pipedapi.adminforge.de',
			'https://api.piped.projectsegfau.lt',
			'https://pipedapi.leptons.xyz',
			'https://pipedapi.r4fo.com'
		];
		// ============================================================

		const params = new URLSearchParams(window.location.search);
		const videoId = params.get('v');
		const volumePercent = parseInt(params.get('vol') || '100', 10);
		const status = document.getElementById('status');
		const player = document.getElementById('player');

		function setStatus(msg, cls = '') {
			status.textContent = msg;
			status.className = cls;
		}

		// Sélectionne le meilleur stream audio depuis le JSON Piped.
		// Préfère le bitrate le plus haut, en évitant les formats DRM.
		function pickBestAudioStream(audioStreams) {
			if (!Array.isArray(audioStreams) || audioStreams.length === 0) return null;
			// Filter out anything sans URL ou en DRM
			const playable = audioStreams.filter(s => s.url && !s.drmFamilies);
			if (playable.length === 0) return null;
			// Tri par bitrate desc (default 0 si absent)
			playable.sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
			return playable[0];
		}

		// Tente une instance Piped. Retourne { ok, url, error }.
		async function tryInstance(endpoint, vid) {
			try {
				const res = await fetch(`${endpoint}/streams/${encodeURIComponent(vid)}`, {
					method: 'GET',
					headers: { 'Accept': 'application/json' }
				});
				if (!res.ok) {
					return { ok: false, error: `HTTP ${res.status}` };
				}
				const data = await res.json();
				if (data.error) {
					return { ok: false, error: data.error };
				}
				const stream = pickBestAudioStream(data.audioStreams);
				if (!stream) {
					return { ok: false, error: 'no playable audio stream' };
				}
				return { ok: true, url: stream.url };
			} catch (err) {
				return { ok: false, error: err.message };
			}
		}

		async function resolveAudioUrl(vid) {
			const errors = [];
			for (const endpoint of PIPED_INSTANCES) {
				const host = new URL(endpoint).hostname;
				setStatus(`Tentative via ${host}...`);
				const result = await tryInstance(endpoint, vid);
				if (result.ok) return result.url;
				errors.push(`${host}: ${result.error}`);
			}
			throw new Error(`Toutes les instances Piped ont échoué :\n${errors.join('\n')}`);
		}

		if (!videoId) {
			setStatus('Aucun videoId fourni. Usage : ?v=VIDEO_ID', 'error');
		} else {
			// Volume initial (clamp 0..1 pour HTML5 audio)
			player.volume = Math.max(0, Math.min(100, volumePercent)) / 100;

			setStatus('Extraction audio via Piped...');
			resolveAudioUrl(videoId)
				.then(audioUrl => {
					setStatus('Lecture en cours (audio direct, sans pub).', 'ok');
					player.src = audioUrl;
					player.play().catch(err => {
						setStatus(`Autoplay bloqué : ${err.message}. Tap simulé en attente.`, 'error');
					});
				})
				.catch(err => {
					setStatus(`Erreur d'extraction : ${err.message}`, 'error');
					console.error('[SCPRP YT] Extract failed:', err);
				});
		}

		player.addEventListener('ended', () => setStatus('Lecture terminée.'));
		player.addEventListener('error', e => setStatus(`Audio error: ${player.error?.message ?? 'unknown'}`, 'error'));
	</script>
</body>
</html>
