<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SCPRP YouTube Audio</title>
	<meta name="referrer" content="strict-origin-when-cross-origin">
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
			color: #fff;
			font-family: monospace;
			overflow: hidden;
		}
		#status {
			padding: 10px;
			font-size: 11px;
			color: #888;
		}
		#status.error {
			color: #ff6666;
		}
		#status.ok {
			color: #66ff66;
		}
	</style>
</head>
<body>
	<audio id="player" autoplay></audio>
	<div id="status">Initialisation...</div>

	<script>
		// ============================================================
		// === COBALT.TOOLS — extracteur d'URL audio public ===
		// API publique open-source qui retourne une URL audio directe
		// pour une URL YouTube. Pas d'iframe = 0 pub.
		//
		// Endpoints à essayer dans l'ordre (fallback si l'un est down) :
		// - api.cobalt.tools (instance principale)
		// - co.wuk.sh (mirror communautaire historique)
		//
		// Si TOUS les endpoints sont down, ajoute-en un nouveau dans la
		// liste depuis https://instances.cobalt.tools/ (page publique
		// listant les instances communautaires actives).
		// ============================================================
		const COBALT_INSTANCES = [
			'https://api.cobalt.tools/',
			'https://co.wuk.sh/api/json'
		];
		// ============================================================

		const params = new URLSearchParams(window.location.search);
		const videoId = params.get('v');
		const volumePercent = parseInt(params.get('vol') || '100', 10);
		const status = document.getElementById('status');
		const player = document.getElementById('player');

		function setStatus(msg, cls = '') {
			status.textContent = msg;
			status.className = cls;
		}

		// Tente une instance cobalt. Retourne { ok, url, error }.
		async function tryInstance(endpoint, youtubeUrl) {
			try {
				const res = await fetch(endpoint, {
					method: 'POST',
					headers: {
						'Accept': 'application/json',
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({
						url: youtubeUrl,
						// v10 API (api.cobalt.tools) :
						downloadMode: 'audio',
						audioFormat: 'mp3',
						// Legacy API (co.wuk.sh) — coexistent dans le même body :
						isAudioOnly: true,
						aFormat: 'mp3'
					})
				});

				if (!res.ok) {
					return { ok: false, error: `HTTP ${res.status}` };
				}

				const data = await res.json();

				// v10 : status = "tunnel" | "redirect" | "picker" | "error"
				// legacy : status = "stream" | "redirect" | "picker" | "error" | "rate-limit"
				if (data.status === 'error' || data.status === 'rate-limit') {
					return {
						ok: false,
						error: data.text || data.error?.code || data.status
					};
				}

				// "url" présent pour tunnel / redirect / stream
				if (data.url) {
					return { ok: true, url: data.url };
				}

				// "picker" = plusieurs choix (rare pour audio mono-track)
				if (data.picker && data.picker.length > 0) {
					return { ok: true, url: data.picker[0].url };
				}

				return { ok: false, error: 'no url in response' };
			} catch (err) {
				return { ok: false, error: err.message };
			}
		}

		async function resolveAudioUrl(youtubeUrl) {
			const errors = [];
			for (const endpoint of COBALT_INSTANCES) {
				setStatus(`Tentative via ${new URL(endpoint).hostname}...`);
				const result = await tryInstance(endpoint, youtubeUrl);
				if (result.ok) return result.url;
				errors.push(`${new URL(endpoint).hostname}: ${result.error}`);
			}
			throw new Error(`Toutes les instances cobalt ont échoué :\n${errors.join('\n')}`);
		}

		if (!videoId) {
			setStatus('Aucun videoId fourni. Usage : ?v=VIDEO_ID', 'error');
		} else {
			// Volume initial (clamp 0..1 pour HTML5 audio)
			player.volume = Math.max(0, Math.min(100, volumePercent)) / 100;

			const youtubeUrl = `https://youtube.com/watch?v=${encodeURIComponent(videoId)}`;
			setStatus('Extraction audio via cobalt.tools...');

			resolveAudioUrl(youtubeUrl)
				.then(audioUrl => {
					setStatus('Lecture en cours (audio direct, sans pub).', 'ok');
					player.src = audioUrl;
					player.play().catch(err => {
						// Autoplay bloqué → le tap-to-unblock du HUD doit déclencher.
						setStatus(`Autoplay bloqué : ${err.message}. Tap simulé en attente.`, 'error');
					});
				})
				.catch(err => {
					setStatus(`Erreur d'extraction : ${err.message}`, 'error');
					console.error('[SCPRP YT] Extract failed:', err);
				});
		}

		// Catch les events audio pour debug
		player.addEventListener('ended', () => setStatus('Lecture terminée.'));
		player.addEventListener('error', e => setStatus(`Audio error: ${player.error?.message ?? 'unknown'}`, 'error'));
	</script>
</body>
</html>
